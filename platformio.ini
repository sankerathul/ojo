[env:esp32-c3-devkitm-1]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps = 
    moononournation/GFX Library for Arduino@1.3.7
    lovyan03/LovyanGFX@^1.1.9
